name: Cache BVC Data

on:
  schedule:
    # Tous les jours à 16h30 UTC+1 (après fermeture BVC 15h30)
    - cron: '30 15 * * 1-5'
  workflow_dispatch:  # Déclenchement manuel possible

jobs:
  update-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Fetch and cache BVC data
        run: python scripts/cache_data.py

      - name: Commit and push cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache/
          git diff --staged --quiet || git commit -m "chore: update BVC data cache [skip ci]"
          git push
