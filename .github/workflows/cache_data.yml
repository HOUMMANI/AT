name: Cache BVC Data

on:
  schedule:
    - cron: '30 15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "yfinance>=0.2.36" pandas numpy

      - name: Fetch and cache BVC data
        run: python scripts/cache_data.py

      - name: Push CSVs to data-cache branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Sauvegarder les CSV générés
          cp -r data/cache /tmp/bvc_cache

          # Basculer sur data-cache (créer si inexistant)
          git fetch origin
          if git ls-remote --exit-code --heads origin data-cache; then
            git checkout data-cache
          else
            git checkout --orphan data-cache
            git rm -rf . --quiet 2>/dev/null || true
          fi

          # Restaurer les CSV
          mkdir -p data/cache
          cp /tmp/bvc_cache/*.csv data/cache/ 2>/dev/null || true
          cp /tmp/bvc_cache/_meta.txt data/cache/ 2>/dev/null || true

          # Commit et push
          git add data/cache/
          git diff --staged --quiet && echo "Aucun changement, skip." && exit 0
          git commit -m "chore: BVC data cache $(date +%Y-%m-%d)"
          git push origin data-cache
